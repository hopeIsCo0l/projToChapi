services:
  - type: web
    name: waitlist-backend
    env: python
    plan: free
    buildCommand: pip install -r backend/requirements.txt
    startCommand: uvicorn backend.app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: waitlist-db
          property: connectionString
      - key: ADMIN_PASSWORD
        value: admin123
      - key: PYTHON_VERSION
        value: 3.11.0

databases:
  - name: waitlist-db
    plan: free


